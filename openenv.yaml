name: compliance-monitor
version: "1.0.0"
description: >
  AI-powered compliance monitoring environment. An agent ingests structured
  compliance rules and scans company records to detect violations, assign severity,
  generate plain-English explanations, suggest fixes, and flag policy conflicts.
author: RunTimers (Gargi Monga + Anushka Pandey)
tags: [compliance, legal, enterprise, NLP, policy-enforcement]

observation_space:
  type: object
  properties:
    records:
      type: array
      description: List of company records (employees, contracts, transactions)
    rules:
      type: array
      description: List of active compliance rules extracted from policy documents
    violations:
      type: array
      description: Currently flagged violations with severity and explanation
    current_record_index:
      type: integer
    episode_step:
      type: integer
    done:
      type: boolean

action_space:
  type: object
  description: >
    Six possible actions: check_record, flag_violation, assign_severity,
    generate_explanation, suggest_fix, resolve_conflict

tasks:
  - id: task_easy
    name: Single Record vs Single Rule
    difficulty: easy
    max_steps: 10
    grader: graders/task1_grader.py

  - id: task_medium
    name: Multi-Record Multi-Rule Compliance Scan
    difficulty: medium
    max_steps: 60
    grader: graders/task2_grader.py

  - id: task_hard
    name: Full DB Scan with Conflicting Policies
    difficulty: hard
    max_steps: 200
    grader: graders/task3_grader.py

reward:
  description: detection(0.4) + severity(0.2) + explanation(0.2) + fix(0.2)
  range: [0.0, 1.0]
  shaped: true

episode:
  termination:
    - all_records_checked
    - max_steps_reached

api:
  endpoints:
    - POST /reset
    - POST /step
    - GET  /state
    - GET  /tasks
